<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#09090b" />
  <title>{{ title }} - Jonah Merriam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <nav>
    <div class="container">
      <a href="../" class="nav-brand">Jonah Merriam</a>
      <ul>
        <li><a href="../">Home</a></li>
        <li><a href="index.html">Blog</a></li>
      </ul>
    </div>
  </nav>

  <header class="hero hero-sm">
    <div class="hero-content">
      <h1 class="reveal" data-reveal="up">{{ title }}</h1>
      <p class="hero-subtitle reveal" data-reveal="up">{{ summary }}</p>
    </div>
  </header>

  <section class="post" id="content">
    <div class="container">
      <article class="post-body reveal" data-reveal="up">
        <p class="post-meta">Published <span class="post-date">{{ display_date }}</span></p>
{{ content }}
      </article>
    </div>
  </section>

  <footer>
    <p>&copy; <span id="current-year"></span> Jonah Merriam. Built with care.</p>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
